# Fashion Embedding Explorer — pipeline configuration (50k scale)

subset:
  n_images: 50000
  n_candidates: 250000
  candidate_scan: 10000000
  thumbnail_size: 160
  detection_image_size: 768
  selection_mode: outfit
  clip_rerank: true
  seed: 42

clip:
  model_name: ViT-B-32
  pretrained: laion400m_e31
  batch_size: 32

garments:
  method: detr
  confidence_threshold: 0.5

projection:
  method: auto  # auto, umap, pca

axes:
  method: clip_prompt_direction

clusters:
  n_clusters: 25
  method: kmeans

annotation:
  pairs_per_axis: 100
  seed: 42
