<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="600" fill="#1e293b">Pipeline overview</text>

  <!-- Source -->
  <rect x="280" y="50" width="240" height="36" rx="6" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="400" y="73" text-anchor="middle" font-size="12" fill="#475569">LAION-natural (millions of images)</text>

  <line x1="400" y1="86" x2="400" y2="110" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- Caption scoring -->
  <rect x="280" y="110" width="240" height="36" rx="6" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="400" y="133" text-anchor="middle" font-size="12" fill="#1e40af">Caption scoring (outfit mode)</text>

  <line x1="400" y1="146" x2="400" y2="170" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- CLIP reranking -->
  <rect x="280" y="170" width="240" height="36" rx="6" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="400" y="193" text-anchor="middle" font-size="12" fill="#1e40af">CLIP image reranking</text>

  <line x1="400" y1="206" x2="400" y2="230" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- Curated subset -->
  <rect x="280" y="230" width="240" height="36" rx="6" fill="#dcfce7" stroke="#86efac"/>
  <text x="400" y="253" text-anchor="middle" font-size="12" font-weight="500" fill="#166534">Curated bundle (200–50k images)</text>

  <!-- Branches -->
  <line x1="400" y1="266" x2="400" y2="290" stroke="#64748b"/>

  <!-- Left branch -->
  <line x1="400" y1="290" x2="140" y2="290" stroke="#64748b"/>
  <line x1="140" y1="290" x2="140" y2="310" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- Center-left branch -->
  <line x1="400" y1="290" x2="290" y2="290" stroke="#64748b"/>
  <line x1="290" y1="290" x2="290" y2="310" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- Center-right branch -->
  <line x1="400" y1="290" x2="510" y2="290" stroke="#64748b"/>
  <line x1="510" y1="290" x2="510" y2="310" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- Right branch -->
  <line x1="400" y1="290" x2="660" y2="290" stroke="#64748b"/>
  <line x1="660" y1="290" x2="660" y2="310" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- DETR detection -->
  <rect x="60" y="310" width="160" height="50" rx="6" fill="#fef3c7" stroke="#fcd34d"/>
  <text x="140" y="332" text-anchor="middle" font-size="11" fill="#92400e">DETR garment</text>
  <text x="140" y="348" text-anchor="middle" font-size="11" fill="#92400e">detection</text>

  <!-- UMAP + clusters -->
  <rect x="210" y="310" width="160" height="50" rx="6" fill="#e0e7ff" stroke="#a5b4fc"/>
  <text x="290" y="332" text-anchor="middle" font-size="11" fill="#3730a3">UMAP projection</text>
  <text x="290" y="348" text-anchor="middle" font-size="11" fill="#3730a3">+ clustering</text>

  <!-- CLIP axes -->
  <rect x="430" y="310" width="160" height="50" rx="6" fill="#e0e7ff" stroke="#a5b4fc"/>
  <text x="510" y="332" text-anchor="middle" font-size="11" fill="#3730a3">CLIP prompt-direction</text>
  <text x="510" y="348" text-anchor="middle" font-size="11" fill="#3730a3">style axes</text>

  <!-- FAISS -->
  <rect x="580" y="310" width="160" height="50" rx="6" fill="#e0e7ff" stroke="#a5b4fc"/>
  <text x="660" y="332" text-anchor="middle" font-size="11" fill="#3730a3">FAISS vector</text>
  <text x="660" y="348" text-anchor="middle" font-size="11" fill="#3730a3">search index</text>

  <!-- Garment embeddings (from DETR) -->
  <line x1="140" y1="360" x2="140" y2="385" stroke="#64748b" marker-end="url(#arrow)"/>
  <rect x="60" y="385" width="160" height="36" rx="6" fill="#fef3c7" stroke="#fcd34d"/>
  <text x="140" y="408" text-anchor="middle" font-size="11" fill="#92400e">Garment CLIP embeddings</text>

  <!-- All converge to explorer -->
  <line x1="140" y1="421" x2="140" y2="450" stroke="#64748b"/>
  <line x1="290" y1="360" x2="290" y2="450" stroke="#64748b"/>
  <line x1="510" y1="360" x2="510" y2="450" stroke="#64748b"/>
  <line x1="660" y1="360" x2="660" y2="450" stroke="#64748b"/>

  <line x1="140" y1="450" x2="660" y2="450" stroke="#64748b"/>
  <line x1="400" y1="450" x2="400" y2="470" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- Explorer -->
  <rect x="250" y="470" width="300" height="40" rx="8" fill="#7c3aed" stroke="#6d28d9"/>
  <text x="400" y="495" text-anchor="middle" font-size="14" font-weight="600" fill="white">Interactive Explorer</text>
</svg>
